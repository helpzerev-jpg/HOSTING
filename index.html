<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Sh2D — реєстрація підтверджена</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: radial-gradient(circle at 20% 30%, #0a0f1a, #03060b);
            font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', 'Roboto', 'Helvetica Neue', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
            position: relative;
            overflow-x: hidden;
        }

        /* динамічний фон із сіткою та відблисками */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: 
                linear-gradient(rgba(56, 189, 248, 0.02) 1px, transparent 1px),
                linear-gradient(90deg, rgba(56, 189, 248, 0.02) 1px, transparent 1px);
            background-size: 40px 40px;
            pointer-events: none;
            z-index: 0;
        }

        body::after {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(ellipse at 70% 40%, rgba(0, 255, 255, 0.08), transparent 60%);
            pointer-events: none;
            z-index: 0;
        }

        /* головний контейнер картки */
        .card {
            position: relative;
            z-index: 10;
            max-width: 560px;
            width: 100%;
            background: rgba(12, 18, 28, 0.75);
            backdrop-filter: blur(12px);
            border-radius: 3rem;
            border: 1px solid rgba(80, 200, 245, 0.25);
            box-shadow: 0 25px 45px -12px rgba(0, 0, 0, 0.8), 0 0 0 0.5px rgba(0, 255, 255, 0.1) inset, 0 0 20px rgba(0, 210, 255, 0.1);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            animation: fadeInUp 0.6s cubic-bezier(0.2, 0.9, 0.4, 1.1);
        }

        .card:hover {
            border-color: rgba(0, 240, 255, 0.5);
            box-shadow: 0 30px 50px -15px rgba(0, 200, 255, 0.25), 0 0 0 1px rgba(0, 255, 255, 0.2) inset;
            transform: translateY(-3px);
        }

        /* внутрішній вміст */
        .card-content {
            padding: 2.8rem 2.2rem;
        }

        /* ікона успіху з анімацією */
        .icon-circle {
            display: flex;
            justify-content: center;
            margin-bottom: 2rem;
        }

        .success-svg {
            width: 90px;
            height: 90px;
            background: rgba(0, 220, 200, 0.1);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(4px);
            border: 1px solid rgba(0, 255, 200, 0.4);
            box-shadow: 0 0 25px rgba(0, 230, 200, 0.3);
            animation: glowPulse 2s infinite alternate;
        }

        .check-mark {
            width: 58px;
            height: 58px;
            stroke: #00f2e8;
            stroke-width: 2.5;
            stroke-linecap: round;
            stroke-linejoin: round;
            fill: none;
            animation: drawCheck 0.55s cubic-bezier(0.65, 0, 0.35, 1) forwards;
            stroke-dasharray: 80;
            stroke-dashoffset: 80;
        }

        /* заголовок */
        h1 {
            text-align: center;
            font-size: 2rem;
            font-weight: 700;
            letter-spacing: -0.02em;
            background: linear-gradient(135deg, #ffffff 0%, #a0f0ff 80%);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            margin-bottom: 0.75rem;
            text-shadow: 0 2px 5px rgba(0, 160, 210, 0.2);
        }

        .brand {
            font-family: monospace;
            font-weight: 600;
            background: linear-gradient(145deg, #b4fbff, #2ad4ff);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            font-size: 2.1rem;
        }

        .sub-message {
            text-align: center;
            color: #b9e6ff;
            font-size: 1.2rem;
            font-weight: 500;
            margin-top: 0.5rem;
            margin-bottom: 0.5rem;
            opacity: 0.9;
        }

        .success-text {
            font-size: 1.5rem;
            font-weight: 600;
            text-align: center;
            margin: 1rem 0 0.8rem;
            background: linear-gradient(145deg, #e2fcff, #90e6ff);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
        }

        .description {
            text-align: center;
            color: #8da3bb;
            font-size: 0.95rem;
            margin: 1rem 0 1.5rem;
            line-height: 1.5;
            border-top: 1px dashed rgba(72, 187, 255, 0.3);
            padding-top: 1.2rem;
        }

        /* кнопка дії */
        .btn-group {
            display: flex;
            justify-content: center;
            margin-top: 1rem;
        }

        .btn-primary {
            background: linear-gradient(105deg, rgba(0, 210, 200, 0.2), rgba(0, 160, 210, 0.15));
            border: 1px solid rgba(0, 240, 255, 0.7);
            padding: 0.9rem 2rem;
            border-radius: 60px;
            font-size: 1rem;
            font-weight: 600;
            color: #e0f5ff;
            cursor: pointer;
            transition: all 0.25s ease;
            backdrop-filter: blur(8px);
            display: inline-flex;
            align-items: center;
            gap: 0.7rem;
            font-family: inherit;
            letter-spacing: 0.3px;
            box-shadow: 0 5px 12px rgba(0, 0, 0, 0.2);
        }

        .btn-primary:hover {
            background: linear-gradient(105deg, rgba(0, 230, 220, 0.35), rgba(0, 180, 230, 0.3));
            border-color: #0ff;
            color: white;
            transform: scale(1.02);
            box-shadow: 0 8px 22px rgba(0, 210, 255, 0.25);
        }

        .btn-primary:active {
            transform: scale(0.98);
        }

        /* додатковий декоративний елемент */
        .glow-dot {
            position: absolute;
            width: 180px;
            height: 180px;
            background: radial-gradient(circle, rgba(0, 255, 200, 0.2), transparent 70%);
            border-radius: 50%;
            filter: blur(40px);
            bottom: -30px;
            right: -20px;
            z-index: -1;
            pointer-events: none;
        }

        .glow-dot-left {
            position: absolute;
            width: 150px;
            height: 150px;
            background: radial-gradient(circle, rgba(0, 160, 255, 0.2), transparent 70%);
            filter: blur(45px);
            top: -30px;
            left: -20px;
            z-index: -1;
            pointer-events: none;
        }

        /* анімації */
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes drawCheck {
            to {
                stroke-dashoffset: 0;
            }
        }

        @keyframes glowPulse {
            0% {
                box-shadow: 0 0 5px rgba(0, 230, 210, 0.2), 0 0 0px rgba(0, 230, 210, 0);
                border-color: rgba(0, 255, 200, 0.4);
            }
            100% {
                box-shadow: 0 0 20px rgba(0, 230, 210, 0.6), 0 0 8px rgba(0, 255, 200, 0.5);
                border-color: rgba(0, 255, 230, 0.9);
            }
        }

        /* адаптивність */
        @media (max-width: 550px) {
            .card-content {
                padding: 2rem 1.5rem;
            }
            h1 {
                font-size: 1.7rem;
            }
            .brand {
                font-size: 1.8rem;
            }
            .success-text {
                font-size: 1.3rem;
            }
            .sub-message {
                font-size: 1rem;
            }
            .btn-primary {
                padding: 0.7rem 1.6rem;
            }
        }
        
        /* додатковий блиск тексту */
        .highlight {
            font-weight: 700;
            color: #bbf5ff;
        }

        footer {
            text-align: center;
            font-size: 0.7rem;
            margin-top: 1.8rem;
            color: rgba(120, 160, 190, 0.6);
            letter-spacing: 0.5px;
        }
    </style>
</head>
<body>

<div class="card">
    <div class="card-content">
        <div class="icon-circle">
            <div class="success-svg">
                <svg class="check-mark" viewBox="0 0 52 52" xmlns="http://www.w3.org/2000/svg">
                    <path d="M14 27 L23 35 L40 16" stroke="currentColor" fill="none" stroke-width="4.5" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
            </div>
        </div>

        <h1>
            <span class="brand">Sh2D</span>
        </h1>
        <div class="success-text">✅ Ви успішно зареєструвались!</div>
        <div class="sub-message">Ваш акаунт активовано</div>
        <div class="description">
            Ласкаво просимо до спільноти <span class="highlight">Sh2D</span>. <br>
            Натисніть кнопку нижче, щоб приєднатися до нашого Discord-серверу та продовжити знайомство.
        </div>
        <div class="btn-group">
            <button id="joinDiscordBtn" class="btn-primary">
                <span>🎧</span> Приєднатись до Discord
            </button>
        </div>
        <footer>
            Sh2D · темна гармонія технологій
        </footer>
    </div>
    <div class="glow-dot"></div>
    <div class="glow-dot-left"></div>
</div>

<script>
    (function() {
        // Посилання на Discord-запрошення
        const DISCORD_INVITE_URL = 'https://discord.gg/zwPXDFNKH';
        const joinButton = document.getElementById('joinDiscordBtn');
        
        if (joinButton) {
            joinButton.addEventListener('click', function(e) {
                e.preventDefault();
                // Перенаправляємо користувача на Discord (у тій самій вкладці)
                window.location.href = DISCORD_INVITE_URL;
            });
        }
        
        // Легке логування для розробника
        console.log('✅ Sh2D confirm.html — сторінка підтвердження завантажена. Кнопка веде на Discord.');
        
        // Якщо в URL є параметри помилки від Supabase — покажемо м'яке попередження
        const urlParams = new URLSearchParams(window.location.search);
        const errorCode = urlParams.get('error');
        const errorDesc = urlParams.get('error_description');
        
        if (errorCode && errorDesc) {
            const descriptionDiv = document.querySelector('.description');
            if (descriptionDiv) {
                const warnSpan = document.createElement('div');
                warnSpan.style.marginTop = '10px';
                warnSpan.style.fontSize = '0.85rem';
                warnSpan.style.background = 'rgba(255,80,80,0.12)';
                warnSpan.style.padding = '8px 12px';
                warnSpan.style.borderRadius = '48px';
                warnSpan.style.border = '1px solid rgba(255,100,100,0.3)';
                warnSpan.style.color = '#ffbfa8';
                warnSpan.innerHTML = `⚠️ Увага: ${decodeURIComponent(errorDesc)}. Можливо, ви вже підтвердили email. Спробуйте увійти або перейти в Discord.`;
                descriptionDiv.appendChild(warnSpan);
            }
        }
        
        // невеликий ефект курсору
        if (joinButton) {
            joinButton.style.cursor = 'pointer';
        }
    })();
</script>
</body>
</html>
